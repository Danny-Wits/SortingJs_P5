<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BEAUTY OF SORTING</title>
    <link rel="icon" href="sortingicon.png" />
    <link rel="stylesheet" type="text/css" href="style.css" />
    <script src="libraries/p5.min.js"></script>
    <script src="libraries/p5.sound.min.js"></script>
  </head>

  <body>
    <main class="main" id="main"></main>
    <div class="top-header">
      <h1>Beauty of Sorting</h1>
      <p class="department-credit">
        Department of Computer Science, University of Jammu
      </p>
    </div>
    <div class="title hide">
      <h3>Beauty of Sorting</h3>
      <p>
        by
        <a target="_blank" href="https://github.com/Danny-Wits">Danny-Wits</a>
      </p>
    </div>
    <button class="menu-toggle-button" onclick="toggle_menu()">Menu</button>
    <div class="menu hide">
      <p class="size-label">List Size</p>
      <input type="number" id="size" value="15" min="1" max="1000" />

      <button onclick="new_list()">New List</button>
      <button onclick="shuffle_list()">Shuffle</button>

      <div class="checkboxs">
        <span>Audio</span>
        <input type="checkbox" onchange="toggle_audio()" />
        <span>Time Info</span>
        <input type="checkbox" onchange="toggle_time_info()" />
        <span>Circles</span>
        <input type="checkbox" onchange="toggle_circle_mode()" checked />
      </div>
      <div class="gap"></div>

      <p id="speedLabel">Speed : 10</p>
      <input type="range" id="delay" min="1" max="100" value="5" />

      <div class="gap"></div>
      <p>Select Algorithm</p>
      <select name="algorithm" id="algo"></select>
    </div>
    <button class="stop" onclick="stop_sort()">Stop</button>
    <button class="sort" onclick="sort_list()">Sort</button>
    <div class="stats" id="time"></div>
    <script src="audio.js"></script>
    <script src="bar.js"></script>
    <script src="simulation.js"></script>
    <script src="sorting.js"></script>
    <script src="sketch.js"></script>
  </body>
</html>
